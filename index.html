<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goldy Brown Kit Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--wht:#111;--cream:#141414;--sand:#1e1e1e;
  --brd:#222;--brd2:#2a2a2a;
  --blk:#e8e4dd;--dk:#d4d0c8;--mid:#8a8578;--dim:#6b6560;--lt:#4a4640;
  --gold:#c9a96e;--gold2:#a68b55;
  --fh:'Playfair Display',Georgia,serif;
  --fb:'Inter','Helvetica Neue',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--bg);color:var(--blk);font-weight:300;-webkit-font-smoothing:antialiased}
::selection{background:var(--gold);color:var(--bg)}

/* HEADER */
.hdr{text-align:center;padding:60px 48px 32px}
.hdr-logo{font-family:var(--fh);font-size:16px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:24px;font-weight:400}
.hdr h1{font-family:var(--fh);font-size:clamp(30px,4.5vw,52px);font-weight:400;color:var(--blk);margin-bottom:10px}
.hdr h1 em{font-style:italic}
.hdr p{font-size:13px;color:var(--mid);max-width:440px;margin:0 auto;line-height:1.8;font-weight:300}

/* TIERS */
.tiers{display:flex;justify-content:center;gap:12px;padding:24px 48px 0;flex-wrap:wrap}
.ti{padding:18px 28px;border:1px solid var(--brd);cursor:pointer;text-align:center;transition:.3s;background:var(--wht);min-width:140px}
.ti:hover{border-color:var(--gold)}
.ti.on{border-color:var(--gold);background:rgba(201,169,110,.1)}
.ti.on .ti-l,.ti.on .ti-s{color:var(--gold)}
.ti-l{font-family:var(--fh);font-size:24px;color:var(--blk);font-weight:400;transition:.3s}
.ti-s{font-size:10px;color:var(--dim);margin-top:3px;letter-spacing:1px;transition:.3s}

/* BUDGET */
.bstrip{max-width:600px;margin:28px auto 0;padding:0 48px}
.brow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.bamt{font-family:var(--fh);font-size:32px;color:var(--blk);font-weight:400}
.bof{font-size:12px;color:var(--dim)}.bof b{color:var(--blk)}
.bar-o{height:6px;background:var(--sand);border-radius:3px}
.bar-i{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.2,0,.2,1),background .3s}
.bar-ok{background:var(--gold)}.bar-ov{background:#c44}
.bmeta{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--dim)}
.brem{color:var(--gold)}.brem.neg{color:#c44}

/* PRODUCT GRID */
.cw{padding:32px 48px 120px}
.cl{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);padding:28px 0 16px;font-weight:300}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:var(--brd)}
.card{background:var(--wht);display:flex;flex-direction:column;transition:.2s}
.card.inkit{background:var(--cream)}
.card-img{aspect-ratio:1;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:40px;position:relative;transition:.3s}
.card.inkit .card-img{background:var(--sand)}
.card-lt{position:absolute;top:8px;right:8px;font-family:var(--fh);font-size:13px;color:var(--gold);background:rgba(10,10,10,.8);padding:2px 8px;opacity:0;transition:.3s}
.card.inkit .card-lt{opacity:1}
.card-body{padding:14px 16px;flex:1;display:flex;flex-direction:column}
.card-name{font-size:12px;color:var(--blk);font-weight:400;margin-bottom:2px}
.card-desc{font-size:10px;color:var(--dim);margin-bottom:auto}
.card-price{display:flex;align-items:baseline;gap:6px;margin:8px 0}
.card-price .now{font-family:var(--fh);font-size:18px;color:var(--gold);font-weight:400}
.card-price .was{font-size:11px;color:var(--lt);text-decoration:line-through}
.card-qty{display:flex}
.card-qty button{flex:1;height:34px;border:1px solid var(--brd);background:var(--wht);color:var(--mid);font-size:16px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;font-family:var(--fb)}
.card-qty button:hover{border-color:var(--gold);color:var(--gold)}
.qv{flex:1;height:34px;border-top:1px solid var(--brd);border-bottom:1px solid var(--brd);background:var(--bg);color:var(--blk);font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:400}
.qv.has{background:var(--sand);font-weight:500}
.qlocked{opacity:.2!important;cursor:not-allowed!important}

/* BUDGET REMAINING */
.brem-big{font-family:var(--fh);font-size:20px;color:var(--gold);font-weight:400;text-align:center;margin-top:10px}
.brem-big.neg{color:#c44}
.brem-big.full{color:#6b6}
.sbar{position:fixed;bottom:0;left:0;right:0;z-index:90;background:rgba(17,17,17,.97);backdrop-filter:blur(20px);border-top:1px solid var(--brd);padding:16px 48px;display:flex;align-items:center;justify-content:space-between;transform:translateY(100%);transition:transform .4s cubic-bezier(.2,0,.2,1)}
.sbar.show{transform:translateY(0)}
.sbl{display:flex;align-items:center;gap:20px}
.sbt{font-family:var(--fh);font-size:24px;color:var(--gold);font-weight:400}
.sbd{font-size:11px;color:var(--dim)}.sbd b{color:var(--blk)}
.sbtn{padding:12px 32px;font-size:11px;letter-spacing:2px;text-transform:uppercase;background:var(--gold);color:var(--bg);border:none;cursor:pointer;font-family:var(--fb);font-weight:400;transition:.3s}
.sbtn:hover{background:var(--gold2)}

/* INQUIRY FORM (inline, appears after clicking Request Kit) */
.inquiry{display:none;max-width:480px;margin:0 auto;padding:60px 48px 80px;border-top:1px solid var(--brd)}
.inquiry.show{display:block}
.inquiry h2{font-family:var(--fh);font-size:28px;font-weight:400;text-align:center;margin-bottom:28px}
.fg{margin-bottom:20px}
.fg label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px;font-weight:300}
.fg input,.fg textarea{width:100%;padding:12px 0;background:transparent;border:none;border-bottom:1px solid var(--brd);color:var(--blk);font-family:var(--fb);font-size:14px;font-weight:300;outline:none;transition:.3s}
.fg input:focus,.fg textarea:focus{border-color:var(--blk)}
.fg textarea{height:90px;resize:none}
.fsub{width:100%;padding:16px;font-size:11px;letter-spacing:3px;text-transform:uppercase;background:var(--gold);color:var(--bg);border:none;cursor:pointer;font-family:var(--fb);font-weight:300;transition:.3s;margin-top:8px}
.fsub:hover{background:var(--gold2)}
.fok{text-align:center;padding:40px 0;display:none}
.fok h2{font-family:var(--fh);font-size:24px;color:var(--blk);font-weight:400;margin-bottom:6px}
.fok p{color:var(--mid);font-size:13px;font-weight:300}

@media(max-width:768px){
  .hdr,.cw,.bstrip,.inquiry{padding-left:20px;padding-right:20px}
  .tiers{padding:24px 20px 0}
  .sbar{padding:14px 20px}
  .cgrid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:500px){
  .tiers{flex-direction:column;align-items:stretch}
  .ti{min-width:auto}
}
</style>
</head>
<body>

<div class="hdr">
<div class="hdr-logo">Goldy Brown</div>
<h1>Build Your <em>Kit</em></h1>
<p>Pick a tier for volume pricing. Add what you need. Branding, packaging and delivery included.</p>
</div>

<div class="tiers" id="tierEl"></div>
<div class="bstrip" id="budgetEl"></div>
<div class="cw" id="catEl"></div>

<div class="inquiry" id="inq">
<h2>Request This Kit</h2>
<div id="inqForm">
<div class="fg"><label>Name</label><input type="text" id="f-name"></div>
<div class="fg"><label>Hotel / Company</label><input type="text" id="f-hotel"></div>
<div class="fg"><label>Email</label><input type="email" id="f-email"></div>
<div class="fg"><label>Kit Details</label><textarea id="f-msg" readonly></textarea></div>
<button class="fsub" onclick="submitForm()">Send Request</button>
</div>
<div class="fok" id="fOk"><h2>Sent</h2><p>We will reply within 24 hours.</p></div>
</div>

<div class="sbar" id="sbar">
<div class="sbl"><div class="sbt" id="sbT"></div><div class="sbd" id="sbD"></div></div>
<button class="sbtn" onclick="submitKit()">Request Kit &#8594;</button>
</div>

<script>
var P=[
  {id:'h_m',c:'The Holster',n:'Holster (Mens)',e:'\uD83D\uDFE2',p:300,d:'Green suede, engraved'},
  {id:'h_w',c:'The Holster',n:'Holster (Womens)',e:'\u2B1C',p:300,d:'Nude leather'},
  {id:'lug',c:'Travel Essentials',n:'Luggage Tag',e:'\uD83C\uDFF7\uFE0F',p:30,d:'Branded, embossed'},
  {id:'pass',c:'Travel Essentials',n:'Passport Holder',e:'\uD83D\uDCD8',p:60,d:'Full-wrap sleeve'},
  {id:'card',c:'Travel Essentials',n:'Card Holder',e:'\uD83D\uDCB3',p:60,d:'Slim, unisex'},
  {id:'pen',c:'Travel Essentials',n:'Pen Case',e:'\uD83D\uDD8A\uFE0F',p:30,d:'Single sleeve'},
  {id:'tie',c:'Mens Gifts',n:'Tie Case',e:'\uD83D\uDC54',p:100,d:'Travel shape'},
  {id:'cig',c:'Mens Gifts',n:'Cigar Case',e:'\uD83D\uDEAC',p:200,d:'Three-finger'},
  {id:'belt',c:'Mens Gifts',n:'Leather Belt',e:'\u27B0',p:100,d:'Brass buckle'},
  {id:'jew',c:'Womens Gifts',n:'Jewellery Roll',e:'\uD83D\uDC8D',p:120,d:'Travel-safe'},
  {id:'cos',c:'Womens Gifts',n:'Cosmetic Case',e:'\uD83D\uDC84',p:110,d:'Structured'},
  {id:'clu',c:'Womens Gifts',n:'Clutch',e:'\uD83D\uDC5C',p:150,d:'Evening wear'},
  {id:'wat',c:'Womens Gifts',n:'Watch Roll',e:'\u231A',p:140,d:'3-slot padded'}
];
var T=[
  {l:'$10K',budget:10000,disc:0,tag:'Standard'},
  {l:'$25K',budget:25000,disc:0.06,tag:'6% off'},
  {l:'$50K',budget:50000,disc:0.12,tag:'12% off'},
  {l:'$100K',budget:100000,disc:0.20,tag:'20% off'}
];
var cT=0,cart={};

function price(it){return Math.round(it.p*(1-T[cT].disc))}
function total(){var s=0;for(var id in cart){if(cart[id]>0){var it=P.find(function(x){return x.id===id});s+=price(it)*cart[id]}}return s}
function count(){var c=0;for(var id in cart)c+=cart[id];return c}

function rTiers(){
  var h='';T.forEach(function(t,i){
    h+='<div class="ti'+(i===cT?' on':'')+'" onclick="pickT('+i+')"><div class="ti-l">'+t.l+'</div><div class="ti-s">'+t.tag+'</div></div>';
  });document.getElementById('tierEl').innerHTML=h;
}
function pickT(i){cT=i;cart={};rAll()}

function rBudget(){
  var t=total(),b=T[cT].budget,pct=Math.min((t/b)*100,100),over=t>b,rem=b-t;
  var h='<div class="brow"><div class="bamt">$'+t.toLocaleString()+'</div><div class="bof">of <b>$'+b.toLocaleString()+'</b></div></div>';
  h+='<div class="bar-o"><div class="bar-i '+(over?'bar-ov':'bar-ok')+'" style="width:'+pct+'%"></div></div>';
  h+='<div class="bmeta"><span>'+T[cT].tag+'</span><span class="brem'+(rem<0?' neg':'')+'">'+( rem>=0?'$'+rem.toLocaleString()+' left':'$'+Math.abs(rem).toLocaleString()+' over')+'</span></div>';
  if(rem>0){h+='<div class="brem-big">$'+rem.toLocaleString()+' remaining</div>';}
  else if(rem===0){h+='<div class="brem-big full">Budget filled</div>';}
  else{h+='<div class="brem-big neg">$'+Math.abs(rem).toLocaleString()+' over \u2014 locked</div>';}
  document.getElementById('budgetEl').innerHTML=h;
}

function rCat(){
  var cats={};P.forEach(function(p){if(!cats[p.c])cats[p.c]=[];cats[p.c].push(p)});
  var locked=total()>T[cT].budget;
  var h='';for(var c in cats){
    h+='<div class="cl">'+c+'</div><div class="cgrid">';
    cats[c].forEach(function(p){
      var pr=price(p),q=cart[p.id]||0,lt=pr*q,disc=pr<p.p;
      h+='<div class="card'+(q>0?' inkit':'')+'"><div class="card-img">'+p.e+'<div class="card-lt">$'+lt.toLocaleString()+'</div></div>';
      h+='<div class="card-body"><div class="card-name">'+p.n+'</div><div class="card-desc">'+p.d+'</div>';
      h+='<div class="card-price">'+(disc?'<span class="was">$'+p.p+'</span>':'')+'<span class="now">$'+pr+'</span></div>';
      h+='<div class="card-qty"><button onclick="adj(\''+p.id+'\',-1)">\u2212</button><div class="qv'+(q>0?' has':'')+'">'+q+'</div><button'+(locked?' class="qlocked" disabled':'')+' onclick="adj(\''+p.id+'\',1)">+</button></div></div></div>';
    });h+='</div>';
  }document.getElementById('catEl').innerHTML=h;
}

function adj(id,d){
  if(d>0&&total()>T[cT].budget)return;
  if(!cart[id])cart[id]=0;cart[id]+=d;
  if(cart[id]<0)cart[id]=0;if(cart[id]===0)delete cart[id];
  rBudget();rCat();upBar();
}

function upBar(){
  var n=count(),bar=document.getElementById('sbar');
  if(n>0){
    bar.classList.add('show');
    var t=total(),b=T[cT].budget,rem=b-t;
    document.getElementById('sbT').textContent='$'+t.toLocaleString();
    var info='<b>'+n+'</b> item'+(n!==1?'s':'');
    if(rem>0)info+=' \u00B7 $'+rem.toLocaleString()+' left';
    else if(rem<0)info+=' \u00B7 $'+Math.abs(rem).toLocaleString()+' over';
    else info+=' \u00B7 budget filled';
    document.getElementById('sbD').innerHTML=info;
  }
  else{bar.classList.remove('show')}
}

function rAll(){rTiers();rBudget();rCat();upBar()}

function submitKit(){
  var ids=Object.keys(cart).filter(function(id){return cart[id]>0});
  var lines=ids.map(function(id){var p=P.find(function(x){return x.id===id});return p.n+' x '+cart[id]});
  var msg='Tier: '+T[cT].l+'\n\n'+lines.join('\n')+'\n\nTotal: $'+total().toLocaleString();
  document.getElementById('f-msg').value=msg;
  document.getElementById('inq').classList.add('show');
  document.getElementById('inq').scrollIntoView({behavior:'smooth'});
}

function submitForm(){
  var n=document.getElementById('f-name').value.trim();
  var e=document.getElementById('f-email').value.trim();
  var h=document.getElementById('f-hotel').value.trim();
  if(!n||!e||!h){alert('Please fill in name, company, and email.');return}
  document.getElementById('inqForm').style.display='none';
  document.getElementById('fOk').style.display='block';
}

/* Shopify iframe auto-resize */
(function(){try{if(window.parent!==window){var s=function(){window.parent.postMessage({type:'gb-resize',h:document.body.scrollHeight},'*')};window.addEventListener('load',s);new MutationObserver(s).observe(document.body,{subtree:true,childList:true,attributes:true})}}catch(e){}})();

rAll();
</script>
</body>
</html>
