<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex">
<title>Goldy Brown</title>
<script>
var path = location.pathname;
// Partner referral links: /r/<code> -> store the code, then send to the
// site homepage. The code rides along to Shopify checkout automatically.
var ref = path.match(/^\/r\/([A-Za-z0-9_-]{1,40})\/?$/);
if (ref) {
  try { localStorage.setItem('gb-discount', JSON.stringify({ code: ref[1].toUpperCase(), ts: Date.now() })); } catch (e) {}
  location.replace('/');
} else {
  sessionStorage.setItem('gb-redirect', path);
  location.replace('/');
}
</script>
</head>
<body><a href="/">Goldy Brown — return home</a></body>
</html>
